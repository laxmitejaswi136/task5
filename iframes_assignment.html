<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iframes Tag Assignment</title>
</head>
<body>
  <h1>Embedding External Content Using Iframes</h1>

  <!-- Example iframe embedding a Wikipedia page -->
  <iframe 
    src="https://en.wikipedia.org/wiki/HTML"
    width="800"
    height="600"
    frameborder="1"
    scrolling="yes">
  </iframe>

  <p>Experiment by changing the <code>width</code>, <code>height</code>, <code>frameborder</code>, and <code>scrolling</code> attributes to see how they affect the embedded content.</p>
</body>
</html>
